<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>狙击射击游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div class="hud-item">
                <span class="label">击杀数:</span>
                <span id="kills" class="value">0</span>
            </div>
            <div class="hud-item">
                <span class="label">得分:</span>
                <span id="score" class="value">0</span>
            </div>
            <div class="hud-item">
                <span class="label">子弹:</span>
                <span id="bullets" class="value">6/6</span>
            </div>
            <div class="hud-item">
                <span class="label">血量:</span>
                <div id="health-bar">
                    <div id="health-fill"></div>
                </div>
            </div>
            <div class="hud-item" id="zoom-display">
                <span class="label">倍镜:</span>
                <span id="zoom" class="value">1x</span>
            </div>
        </div>
        
        <div id="warning" class="warning hidden">
            <span class="warning-text">!</span>
        </div>
        
        <div id="invincible-timer" class="hidden">
            <span class="label">无敌状态:</span>
            <span id="invincible-time" class="value">15</span>秒
        </div>
        
        <div id="start-screen" class="overlay">
            <div class="overlay-content">
                <h1>狙击射击游戏</h1>
                <div class="instructions">
                    <h2>游戏说明</h2>
                    <ul>
                        <li><strong>鼠标右键</strong> - 开启/关闭瞄准镜</li>
                        <li><strong>鼠标左键</strong> - 射击（需开镜）</li>
                        <li><strong>移动鼠标</strong> - 控制准星</li>
                        <li><strong>滚轮</strong> - 调整倍镜大小</li>
                        <li><strong>R键</strong> - 装弹</li>
                    </ul>
                    <h3>游戏规则</h3>
                    <ul>
                        <li>击杀<span class="criminal">蒙面罪犯</span>得2分</li>
                        <li>误杀<span class="civilian">平民</span>扣1分</li>
                        <li>弹夹6发子弹，用完需装弹</li>
                        <li>击中飞鸟获得15秒无敌状态</li>
                        <li>长时间不开镜会被敌人攻击</li>
                        <li>血量归零则游戏结束</li>
                    </ul>
                </div>
                <button id="start-button">开始游戏</button>
            </div>
        </div>
        
        <div id="game-over-screen" class="overlay hidden">
            <div class="overlay-content">
                <h1>游戏结束</h1>
                <div class="final-stats">
                    <p>最终得分: <span id="final-score">0</span></p>
                    <p>击杀罪犯: <span id="final-kills">0</span></p>
                </div>
                <button id="restart-button">重新开始</button>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
